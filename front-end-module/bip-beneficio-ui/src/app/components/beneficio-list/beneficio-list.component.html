<mat-toolbar color="primary">
  <span>Lista de Benefícios</span>
</mat-toolbar>

<div class="container" style="padding: 20px;">
  <button mat-raised-button color="accent" routerLink="/novo" style="margin-bottom: 20px;">
    <mat-icon>add</mat-icon> Novo Benefício
  </button>

  <table mat-table [dataSource]="beneficios()" class="mat-elevation-z8">
    
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef> ID </th>
      <td mat-cell *matCellDef="let b"> {{b.id}} </td>
    </ng-container>

    <ng-container matColumnDef="nome">
      <th mat-header-cell *matHeaderCellDef> Nome </th>
      <td mat-cell *matCellDef="let b"> {{b.nome}} </td>
    </ng-container>

    <ng-container matColumnDef="valor">
      <th mat-header-cell *matHeaderCellDef> Valor </th>
      <td mat-cell *matCellDef="let b"> {{b.valor | currency:'BRL'}} </td>
    </ng-container>

    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef> Ações </th>
      <td mat-cell *matCellDef="let b">
        <button mat-icon-button color="primary" [routerLink]="['/editar', b.id]">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="deletar(b.id!)">
          <mat-icon>delete</mat-icon>
        </button>
        <button mat-icon-button color="primary" [routerLink]="['/transferencia', b.id]">
          <mat-icon>compare_arrows</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
